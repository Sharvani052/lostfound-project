<h1>Admin Dashboard</h1>

<h2>Search Item</h2>

<form method="GET">
<input type="text" name="search" placeholder="Search item">
<button type="submit">Search</button>
</form>

<table border="1">

<tr>
<th>ID</th>
<th>Name</th>
<th>Description</th>
<th>Location</th>
<th>Type</th>
<th>Date</th>
<th>Action</th>
</tr>

{% for item in items %}

<tr>
<td>{{item[0]}}</td>
<td>{{item[1]}}</td>
<td>{{item[2]}}</td>
<td>{{item[3]}}</td>
<td>{{item[4]}}</td>
<td>{{item[5]}}</td>

<td>
<a href="/delete/{{item[0]}}">Delete</a>
</td>

</tr>

{% endfor %}

</table>
